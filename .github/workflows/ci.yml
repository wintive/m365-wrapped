name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install renderer (librsvg + fonts)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin fonts-dejavu-core
      - run: pip install .[dev]
      - run: ruff check .
      - run: pytest -q
